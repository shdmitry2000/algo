<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AlgoTrade — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #30363d;
      --accent: #58a6ff; --accent2: #3fb950; --warn: #f78166;
      --text: #e6edf3; --muted: #8b949e;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }
    header {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 24px; border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    header h1 { font-size: 1.05rem; font-weight: 600; color: var(--accent); }
    .tabs { display: flex; gap: 4px; flex: 1; }
    .tab-btn {
      background: none; border: none; color: var(--muted); padding: 6px 16px;
      font: inherit; font-size: .85rem; font-weight: 500; cursor: pointer;
      border-bottom: 2px solid transparent; transition: all .15s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .badge { font-size: 0.72rem; padding: 2px 9px; border-radius: 20px; font-weight: 500; }
    .badge.data   { color: var(--muted); background: #21262d; }
    .badge.config { color: #e3b341; background: rgba(227,179,65,.13); }
    .badge.gate-idle { color: var(--muted); background: #21262d; }
    .badge.gate-signal_pending_open { color: var(--warn); background: rgba(247,129,102,.15); }
    .badge.gate-cleared_after_open { color: var(--accent2); background: rgba(63,185,80,.15); }
    .badge.gate-cleared_after_fail { color: var(--warn); background: rgba(247,129,102,.15); }
    .settings-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      border-radius: 6px; padding: 5px 12px; font: inherit; font-size: .8rem;
      cursor: pointer; transition: all .15s;
    }
    .settings-btn:hover { border-color: var(--accent); color: var(--accent); }
    .layout { display: flex; height: calc(100vh - 53px); }

    /* SIDEBAR */
    .sidebar {
      width: 210px; border-right: 1px solid var(--border);
      background: var(--surface); padding: 14px 0; overflow-y: auto; flex-shrink: 0;
    }
    .sidebar h3 { font-size: .68rem; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: .08em; padding: 0 14px 8px; }
    .ticker-btn {
      display: block; width: 100%; text-align: left; padding: 7px 14px;
      background: none; border: none; color: var(--text); font: inherit;
      font-size: .88rem; cursor: pointer; transition: background .12s;
    }
    .ticker-btn:hover, .ticker-btn.active { background: #21262d; color: var(--accent); }
    .sidebar-run {
      margin: 12px 14px 4px; width: calc(100% - 28px);
      background: var(--accent); color: #000; border: none; border-radius: 6px;
      padding: 7px; font: inherit; font-size: .8rem; font-weight: 600; cursor: pointer;
      transition: opacity .15s;
    }
    .sidebar-run:hover { opacity: .85; }
    .sidebar-run:disabled { opacity: .4; cursor: default; }

    /* MAIN */
    .main { flex: 1; overflow-y: auto; padding: 22px; }
    .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 18px; flex-wrap: wrap; }
    .toolbar label { font-size: .8rem; color: var(--muted); }
    select {
      background: var(--surface); border: 1px solid var(--border); color: var(--text);
      border-radius: 6px; padding: 5px 10px; font: inherit; font-size: .83rem; cursor: pointer;
    }
    .pill { font-size: .72rem; padding: 2px 10px; border-radius: 20px; font-weight: 600; }
    .pill.calls { background: rgba(63,185,80,.15); color: var(--accent2); }
    .pill.puts  { background: rgba(247,129,102,.15); color: var(--warn); }
    
    /* EXPIRATION BUTTONS */
    .exp-list { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .exp-btn {
      background: var(--surface); border: 1px solid var(--border); color: var(--muted);
      border-radius: 6px; padding: 6px 14px; font: inherit; font-size: .8rem;
      cursor: pointer; transition: all .15s; font-weight: 500;
    }
    .exp-btn:hover { border-color: var(--accent); color: var(--text); }
    .exp-btn.active { border-color: var(--accent); background: rgba(88,166,255,.12); color: var(--accent); font-weight: 600; }
    h2 { font-size: .98rem; font-weight: 600; }
    .stats { display: flex; gap: 14px; margin-bottom: 18px; flex-wrap: wrap; }
    .stat-card { background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 18px; min-width: 110px; }
    .stat-card .label { font-size: .68rem; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; }
    .stat-card .value { font-size: 1.35rem; font-weight: 700; }
    table { width: 100%; border-collapse: collapse; font-size: .81rem; }
    thead th { text-align: left; padding: 7px 11px; border-bottom: 2px solid var(--border);
      color: var(--muted); font-weight: 600; font-size: .7rem; text-transform: uppercase;
      letter-spacing: .06em; position: sticky; top: 0; background: var(--bg); }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
    tbody tr:hover { background: rgba(88,166,255,.05); }
    tbody td { padding: 6px 11px; }
    .mid { font-weight: 600; color: var(--accent); }
    .call-row td:first-child { border-left: 3px solid var(--accent2); }
    .put-row  td:first-child { border-left: 3px solid var(--warn); }
    .empty { text-align: center; padding: 48px; color: var(--muted); font-size: .9rem; }
    .loader { text-align: center; padding: 32px; color: var(--muted); font-size: .85rem; }
    .refresh-btn {
      margin-left: auto; background: var(--accent); color: #000; border: none;
      border-radius: 6px; padding: 6px 14px; font: inherit; font-size: .8rem;
      font-weight: 600; cursor: pointer; transition: opacity .15s;
    }
    .refresh-btn:hover { opacity: .85; }

    /* SETTINGS MODAL */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.6); backdrop-filter: blur(4px);
      z-index: 100; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      padding: 28px 32px; min-width: 380px; max-width: 460px; width: 100%;
    }
    .modal h2 { font-size: .98rem; margin-bottom: 20px; }
    .form-row { margin-bottom: 16px; }
    .form-row label { display: block; font-size: .75rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
    .form-row select, .form-row input {
      width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text);
      border-radius: 7px; padding: 8px 12px; font: inherit; font-size: .88rem;
    }
    .form-row input:focus, .form-row select:focus { border-color: var(--accent); outline: none; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; }
    .btn-cancel {
      background: none; border: 1px solid var(--border); color: var(--muted);
      border-radius: 7px; padding: 7px 16px; font: inherit; font-size: .85rem; cursor: pointer;
    }
    .btn-save {
      background: var(--accent); color: #000; border: none; border-radius: 7px;
      padding: 7px 18px; font: inherit; font-size: .85rem; font-weight: 600; cursor: pointer;
    }
    .toast {
      position: fixed; bottom: 24px; right: 24px; background: var(--accent2);
      color: #000; padding: 10px 20px; border-radius: 8px; font-weight: 600; font-size: .85rem;
      opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 200;
    }
    .toast.show { opacity: 1; }
    
    /* TAB CONTENT */
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    /* SIGNALS TAB */
    .signals-toolbar {
      display: flex; gap: 10px; align-items: center; margin-bottom: 18px;
    }
    .scan-btn {
      background: var(--accent2); color: #000; border: none; border-radius: 6px;
      padding: 7px 16px; font: inherit; font-size: .85rem; font-weight: 600;
      cursor: pointer; transition: opacity .15s;
    }
    .scan-btn:hover { opacity: .85; }
    .scan-btn:disabled { opacity: .4; cursor: default; }
    tbody tr.clickable { cursor: pointer; }
    tbody tr.clickable:hover { background: rgba(88,166,255,.08); }
    
    /* DETAIL MODAL */
    .modal.detail-modal { min-width: 700px; max-width: 900px; max-height: 85vh; overflow-y: auto; }
    .detail-section { margin-bottom: 24px; }
    .detail-section h3 { font-size: .85rem; color: var(--muted); margin-bottom: 10px; 
      text-transform: uppercase; letter-spacing: .08em; }
    .detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
      gap: 12px; margin-bottom: 18px; }
    .detail-metric { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px; }
    .detail-metric .label { font-size: .68rem; color: var(--muted); margin-bottom: 4px; }
    .detail-metric .value { font-size: 1.1rem; font-weight: 600; }
    pre { background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
      padding: 12px; font-size: .75rem; overflow-x: auto; max-height: 300px; overflow-y: auto; }
  </style>
</head>
<body>

<header>
  <h1>⚡ AlgoTrade Dashboard</h1>
  <nav class="tabs">
    <button class="tab-btn active" onclick="showTab('chains')">Chains</button>
    <button class="tab-btn" onclick="showTab('signals')">Signals</button>
    <button class="tab-btn" onclick="showTab('history')">History</button>
  </nav>
  <span class="badge data" id="dataBadge">data: —</span>
  <span class="badge config" id="configBadge">configured: —</span>
  <button class="settings-btn" onclick="openSettings()">⚙ Settings</button>
</header>

<div class="layout">
  <!-- Tab 1: Chains (existing) -->
  <div id="chainsTab" class="tab-content active">
    <nav class="sidebar">
      <h3>Tickers</h3>
      <div id="tickerList"><div class="loader">Loading…</div></div>
      <button class="sidebar-run" id="runBtn" onclick="runPipeline()">▶ Run Pipeline</button>
    </nav>
    <main class="main">
      <div id="content" class="empty">← Select a ticker to view its option chain from the Redis cache.</div>
    </main>
  </div>

  <!-- Tab 2: Signals (NEW) -->
  <div id="signalsTab" class="tab-content">
    <main class="main" style="width: 100%;">
      <div class="signals-toolbar">
        <h2>Active Signals</h2>
        <button class="scan-btn" id="scanBtn" onclick="triggerScan()">🔍 Run Phase 2 Scan</button>
        <button class="refresh-btn" onclick="loadSignals()">↻ Refresh</button>
      </div>
      <div class="toolbar" style="margin-bottom: 14px;">
        <label>Symbol <select id="sigFilterSymbol" onchange="renderSignalsTable()"><option value="">All</option></select></label>
        <label>Expiration <select id="sigFilterExpiration" onchange="renderSignalsTable()"><option value="">All</option></select></label>
        <label>Type <select id="sigFilterType" onchange="renderSignalsTable()"><option value="">All</option></select></label>
      </div>
      <div id="signalsContent"><div class="loader">Loading signals…</div></div>
    </main>
  </div>

  <!-- Tab 3: History (NEW) -->
  <div id="historyTab" class="tab-content">
    <main class="main" style="width: 100%;">
      <div class="toolbar">
        <h2>Signal History</h2>
        <label>Symbol: <input type="text" id="histSymbol" placeholder="all" style="width:90px;padding:4px 8px;"></label>
        <label>Event: <select id="histEventType">
          <option value="">all</option>
          <option value="precheck_fail">precheck_fail</option>
          <option value="scan_started">scan_started</option>
          <option value="bed_fail">bed_fail</option>
          <option value="signal_upserted">signal_upserted</option>
          <option value="phase3_open_ok">phase3_open_ok</option>
          <option value="phase3_open_fail">phase3_open_fail</option>
          <option value="gate_skip_scan">gate_skip_scan</option>
        </select></label>
        <button class="refresh-btn" onclick="loadHistory()">↻ Refresh</button>
      </div>
      <div id="historyContent"><div class="loader">Loading history…</div></div>
    </main>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeSettings()">
  <div class="modal">
    <h2>⚙ Settings</h2>
    <div class="form-row">
      <label>Active Provider</label>
      <select id="settingProvider">
        <option value="yfinance">yfinance (free, no key)</option>
        <option value="tradier">tradier (Tradier.com)</option>
        <option value="theta">theta (ThetaData Pro)</option>
      </select>
    </div>
    <div class="form-row">
      <label>Tradier Access Token</label>
      <input type="password" id="settingTradierToken" placeholder="leave blank to keep existing" />
    </div>
    <div class="form-row">
      <label>ThetaData Username</label>
      <input type="text" id="settingThetaUser" placeholder="email@example.com" />
    </div>
    <div class="form-row">
      <label>Redis Host</label>
      <input type="text" id="settingRedisHost" placeholder="127.0.0.1" />
    </div>
    <div class="form-row">
      <label>Redis Port</label>
      <input type="text" id="settingRedisPort" placeholder="6379" />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeSettings()">Cancel</button>
      <button class="btn-save" onclick="saveSettings()">Save & Apply</button>
    </div>
  </div>
</div>

<!-- Signal Detail Modal -->
<div class="modal-overlay" id="detailOverlay" onclick="if(event.target===this)closeDetail()">
  <div class="modal detail-modal">
    <h2>Signal Detail</h2>
    <div id="detailContent"></div>
    <div class="modal-actions" style="margin-top: 24px;">
      <button class="btn-cancel" onclick="closeDetail()">Close</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = 'http://localhost:5001/api';
  let currentTicker = null, currentExp = null, allTicks = [];
  let activeSignalsRaw = [];

  function fmtFixed(value, decimals) {
    if (value === null || value === undefined || value === '') return '—';
    const n = Number(value);
    if (Number.isNaN(n)) return '—';
    return n.toFixed(decimals);
  }

  function fmtPercent(value, decimals) {
    if (value === null || value === undefined || value === '') return '—';
    const n = Number(value);
    if (Number.isNaN(n)) return '—';
    return `${n.toFixed(decimals)}%`;
  }

  function showToast(msg, ok=true) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = ok ? 'var(--accent2)' : 'var(--warn)';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  async function loadStatus() {
    const res = await fetch(`${API}/status`).catch(() => null);
    if (!res || !res.ok) return;
    const d = await res.json();
    document.getElementById('configBadge').textContent = `configured: ${d.configured_provider}`;
  }

  async function loadTickers() {
    await loadStatus();
    const res = await fetch(`${API}/tickers`).catch(() => null);
    const list = document.getElementById('tickerList');
    if (!res || !res.ok) {
      list.innerHTML = '<div style="padding:12px;color:#f78166;font-size:.8rem">⚠ API offline</div>';
      return;
    }
    const { tickers } = await res.json();
    if (!tickers.length) {
      list.innerHTML = '<div style="padding:12px;color:#8b949e;font-size:.8rem">No data in cache.<br>Run the pipeline first.</div>';
      return;
    }
    list.innerHTML = tickers.map(t =>
      `<button class="ticker-btn" onclick="selectTicker('${t}')">${t}</button>`
    ).join('');
  }

  async function selectTicker(ticker) {
    currentTicker = ticker; currentExp = null;
    document.querySelectorAll('.ticker-btn').forEach(b => b.classList.toggle('active', b.textContent === ticker));
    document.getElementById('content').innerHTML = '<div class="loader">Fetching…</div>';
    const res = await fetch(`${API}/chain/${ticker}`).catch(() => null);
    if (!res || !res.ok) { document.getElementById('content').innerHTML = '<div class="empty">API error</div>'; return; }
    const data = await res.json();
    allTicks = data.ticks || [];
    renderChain(ticker, allTicks);
  }

  function renderChain(ticker, ticks) {
    if (!ticks.length) { document.getElementById('content').innerHTML = '<div class="empty">No ticks for this ticker in cache.</div>'; return; }
    const exps = [...new Set(ticks.map(t => t.expiration))].sort();
    const exp = currentExp || exps[0]; currentExp = exp;
    const filtered = ticks.filter(t => t.expiration === exp);
    const calls = filtered.filter(t => t.right === 'C').sort((a,b) => a.strike - b.strike);
    const puts  = filtered.filter(t => t.right === 'P').sort((a,b) => a.strike - b.strike);
    const provider = ticks[0]?.provider || '—';
    document.getElementById('dataBadge').textContent = `data: ${provider}`;
    
    const expButtons = exps.map(e => 
      `<button class="exp-btn ${e===exp?'active':''}" onclick="currentExp='${e}';renderChain('${ticker}',allTicks)">${e}</button>`
    ).join('');
    
    document.getElementById('content').innerHTML = `
      <div class="toolbar">
        <h2>${ticker}</h2>
        <span class="pill calls">Calls: ${calls.length}</span>
        <span class="pill puts">Puts: ${puts.length}</span>
        <button class="refresh-btn" onclick="selectTicker('${ticker}')">↻ Refresh</button>
      </div>
      <div class="exp-list">${expButtons}</div>
      <div class="stats">
        <div class="stat-card"><div class="label">Ticks</div><div class="value">${filtered.length}</div></div>
        <div class="stat-card"><div class="label">Expirations</div><div class="value">${exps.length}</div></div>
        <div class="stat-card"><div class="label">Data Provider</div><div class="value" style="font-size:.95rem">${provider}</div></div>
      </div>
      ${buildTable(calls, 'C')}<br>${buildTable(puts, 'P')}`;
  }

  function buildTable(rows, right) {
    const cls = right === 'C' ? 'call-row' : 'put-row';
    const label = right === 'C' ? '📈 Calls' : '📉 Puts';
    if (!rows.length) return `<p style="color:#8b949e;font-size:.85rem">${label}: no data</p>`;
    return `
      <h3 style="margin-bottom:8px;font-size:.83rem;color:${right==='C'?'#3fb950':'#f78166'}">${label}</h3>
      <table>
        <thead><tr><th>Strike</th><th>Bid</th><th>Ask</th><th>Mid</th><th>Volume</th><th>OI</th><th>Timestamp</th></tr></thead>
        <tbody>${rows.map(t => `
          <tr class="${cls}">
            <td>${t.strike}</td><td>${t.bid}</td><td>${t.ask}</td>
            <td class="mid">${t.mid}</td><td>${t.volume}</td><td>${t.open_interest}</td>
            <td style="color:#8b949e;font-size:.73rem">${t.timestamp?.slice(0,19)??'—'}</td>
          </tr>`).join('')}</tbody>
      </table>`;
  }

  async function runPipeline() {
    const btn = document.getElementById('runBtn');
    btn.disabled = true; btn.textContent = '⏳ Running…';
    const res = await fetch(`${API}/run-pipeline`, {method:'POST'}).catch(() => null);
    if (!res || !res.ok) { showToast('Pipeline failed to start', false); }
    else {
      const d = await res.json();
      showToast(`Pipeline started with provider: ${d.provider}`);
      setTimeout(() => { loadTickers(); if (currentTicker) selectTicker(currentTicker); }, 5000);
    }
    setTimeout(() => { btn.disabled = false; btn.textContent = '▶ Run Pipeline'; }, 6000);
  }

  async function openSettings() {
    const res = await fetch(`${API}/settings`).catch(() => null);
    if (res && res.ok) {
      const d = await res.json();
      document.getElementById('settingProvider').value = d.DATA_PROVIDER || 'yfinance';
      document.getElementById('settingThetaUser').value = d.THETA_USERNAME || '';
      document.getElementById('settingRedisHost').value = d.REDIS_HOST || '127.0.0.1';
      document.getElementById('settingRedisPort').value = d.REDIS_PORT || '6379';
    }
    document.getElementById('modalOverlay').classList.add('open');
  }

  function closeSettings() { document.getElementById('modalOverlay').classList.remove('open'); }

  async function saveSettings() {
    const payload = { DATA_PROVIDER: document.getElementById('settingProvider').value };
    const token = document.getElementById('settingTradierToken').value;
    if (token) payload.TRADIER_ACCESS_TOKEN = token;
    const user = document.getElementById('settingThetaUser').value;
    if (user) payload.THETA_USERNAME = user;
    payload.REDIS_HOST = document.getElementById('settingRedisHost').value || '127.0.0.1';
    payload.REDIS_PORT = document.getElementById('settingRedisPort').value || '6379';
    const res = await fetch(`${API}/settings`, {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload)
    }).catch(() => null);
    if (res && res.ok) {
      showToast(`Settings saved! Provider: ${payload.DATA_PROVIDER}`);
      closeSettings();
      loadStatus();
    } else {
      showToast('Failed to save settings', false);
    }
  }

  loadTickers();

  // ===== TAB SWITCHING =====
  function showTab(name) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    
    event.target.classList.add('active');
    document.getElementById(`${name}Tab`).classList.add('active');
    
    if (name === 'signals') loadSignals();
    if (name === 'history') loadHistory();
  }

  // ===== SIGNALS TAB =====
  function signalTypeLabel(sig) {
    return sig.structure_label != null && sig.structure_label !== '' ? sig.structure_label : '—';
  }

  function populateSignalFilterOptions() {
    const symSel = document.getElementById('sigFilterSymbol');
    const expSel = document.getElementById('sigFilterExpiration');
    const typeSel = document.getElementById('sigFilterType');
    if (!symSel || !expSel || !typeSel) return;

    const curSym = symSel.value;
    const curExp = expSel.value;
    const curType = typeSel.value;

    const symbols = [...new Set(activeSignalsRaw.map(s => s.symbol))].sort();
    const exps = [...new Set(activeSignalsRaw.map(s => s.expiration))].sort();
    const types = [...new Set(activeSignalsRaw.map(s => signalTypeLabel(s)))].sort();

    const fill = (sel, values) => {
      sel.innerHTML = '';
      const o0 = document.createElement('option');
      o0.value = '';
      o0.textContent = 'All';
      sel.appendChild(o0);
      values.forEach(v => {
        const o = document.createElement('option');
        o.value = v;
        o.textContent = v;
        sel.appendChild(o);
      });
    };

    fill(symSel, symbols);
    fill(expSel, exps);
    fill(typeSel, types);

    if (symbols.includes(curSym)) symSel.value = curSym;
    if (exps.includes(curExp)) expSel.value = curExp;
    if (types.includes(curType)) typeSel.value = curType;
  }

  function renderSignalsTable() {
    const content = document.getElementById('signalsContent');
    const symSel = document.getElementById('sigFilterSymbol');
    const expSel = document.getElementById('sigFilterExpiration');
    const typeSel = document.getElementById('sigFilterType');

    const fs = symSel ? symSel.value : '';
    const fe = expSel ? expSel.value : '';
    const ft = typeSel ? typeSel.value : '';

    let filtered = activeSignalsRaw;
    if (fs) filtered = filtered.filter(s => s.symbol === fs);
    if (fe) filtered = filtered.filter(s => s.expiration === fe);
    if (ft) filtered = filtered.filter(s => signalTypeLabel(s) === ft);

    if (!activeSignalsRaw.length) {
      content.innerHTML = '<div class="empty">No active signals. Run Phase 2 scan to generate signals.</div>';
      return;
    }

    if (!filtered.length) {
      content.innerHTML = '<div class="empty">No signals match the current filters.</div>';
      return;
    }

    const rows = filtered.map(sig => {
      const gateClass = `gate-${sig.gate_status || 'idle'}`;
      return `
        <tr class="clickable" onclick="showSignalDetail('${sig.symbol}', '${sig.expiration}')">
          <td><strong>${sig.symbol}</strong></td>
          <td>${sig.expiration}</td>
          <td>${sig.dte ?? '—'}</td>
          <td>${sig.structure_label ?? '—'}</td>
          <td>${fmtFixed(sig.break_even_days, 1)}</td>
          <td>${fmtFixed(sig.rank_score, 4)}</td>
          <td><span class="badge ${gateClass}">${sig.gate_status || 'idle'}</span></td>
          <td>${fmtFixed(sig.remaining_profit, 2)}</td>
          <td>${fmtPercent(sig.remaining_percent, 1)}</td>
        </tr>`;
    }).join('');

    content.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Symbol</th>
            <th>Expiration</th>
            <th>DTE</th>
            <th>Type</th>
            <th>BED</th>
            <th>Rank</th>
            <th>Gate Status</th>
            <th>Profit $</th>
            <th>Profit %</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  async function loadSignals() {
    const content = document.getElementById('signalsContent');
    content.innerHTML = '<div class="loader">Loading signals…</div>';

    const res = await fetch(`${API}/signals/active`).catch(() => null);
    if (!res || !res.ok) {
      activeSignalsRaw = [];
      populateSignalFilterOptions();
      content.innerHTML = '<div class="empty">Failed to load signals</div>';
      return;
    }

    const data = await res.json();
    activeSignalsRaw = Array.isArray(data.signals) ? data.signals : [];
    populateSignalFilterOptions();
    renderSignalsTable();
  }

  async function showSignalDetail(symbol, expiration) {
    const res = await fetch(`${API}/signals/active/${symbol}/${expiration}`).catch(() => null);
    if (!res || !res.ok) {
      showToast('Failed to load signal detail', false);
      return;
    }
    
    const {signal, gate} = await res.json();
    if (!signal) {
      showToast('Signal not found', false);
      return;
    }
    
    const gateStatus = gate ? gate.status : 'idle';
    const gateClass = `gate-${gateStatus}`;
    
    const legsTable = signal.legs.map(leg => `
      <tr>
        <td>${leg.leg_index}</td>
        <td>${leg.strike}</td>
        <td>${leg.right}</td>
        <td>${leg.open_action}</td>
        <td>${leg.quantity}</td>
        <td>${fmtFixed(leg.bid, 2)}</td>
        <td>${fmtFixed(leg.ask, 2)}</td>
        <td class="mid">${fmtFixed(leg.mid, 2)}</td>
        <td>${leg.volume ?? '—'}</td>
        <td>${leg.open_interest ?? '—'}</td>
      </tr>`).join('');
    
    document.getElementById('detailContent').innerHTML = `
      <div class="detail-section">
        <div style="display:flex;gap:12px;align-items:center;margin-bottom:12px;">
          <h3 style="margin:0;">${signal.symbol} / ${signal.expiration}</h3>
          <span style="font-size:.9rem;color:var(--muted);">${signal.structure_label}</span>
          <span class="badge ${gateClass}">${gateStatus}</span>
        </div>
        <p style="font-size:.75rem;color:var(--muted);">Signal ID: ${signal.signal_id}</p>
      </div>
      
      <div class="detail-section">
        <h3>Metrics</h3>
        <div class="detail-grid">
          <div class="detail-metric"><div class="label">DTE</div><div class="value">${signal.dte ?? '—'}</div></div>
          <div class="detail-metric"><div class="label">BED</div><div class="value">${fmtFixed(signal.break_even_days, 1)}</div></div>
          <div class="detail-metric"><div class="label">Rank Score</div><div class="value">${fmtFixed(signal.rank_score, 4)}</div></div>
          <div class="detail-metric"><div class="label">Mid Entry</div><div class="value">$${fmtFixed(signal.mid_entry, 2)}</div></div>
          <div class="detail-metric"><div class="label">Spread Cost</div><div class="value">$${fmtFixed(signal.spread_cost, 2)}</div></div>
          <div class="detail-metric"><div class="label">Net Credit</div><div class="value">$${fmtFixed(signal.net_credit, 2)}</div></div>
          <div class="detail-metric"><div class="label">Fees Total</div><div class="value">$${fmtFixed(signal.fees_total, 2)}</div></div>
          <div class="detail-metric"><div class="label">Remaining Profit</div><div class="value">$${fmtFixed(signal.remaining_profit, 2)}</div></div>
          <div class="detail-metric"><div class="label">Remaining %</div><div class="value">${fmtPercent(signal.remaining_percent, 1)}</div></div>
        </div>
      </div>
      
      <div class="detail-section">
        <h3>Legs</h3>
        <table>
          <thead>
            <tr>
              <th>Leg</th><th>Strike</th><th>C/P</th><th>Action</th><th>Qty</th>
              <th>Bid</th><th>Ask</th><th>Mid</th><th>Vol</th><th>OI</th>
            </tr>
          </thead>
          <tbody>${legsTable}</tbody>
        </table>
      </div>
      
      <div class="detail-section">
        <h3>Raw JSON</h3>
        <pre>${JSON.stringify(signal, null, 2)}</pre>
      </div>`;
    
    document.getElementById('detailOverlay').classList.add('open');
  }

  function closeDetail() {
    document.getElementById('detailOverlay').classList.remove('open');
  }

  async function triggerScan() {
    const btn = document.getElementById('scanBtn');
    btn.disabled = true;
    btn.textContent = '⏳ Scanning…';
    
    const res = await fetch(`${API}/signal-scan`, {method: 'POST'}).catch(() => null);
    if (!res || !res.ok) {
      showToast('Scan failed to start', false);
    } else {
      showToast('Phase 2 scan started');
      setTimeout(() => loadSignals(), 8000);
    }
    
    setTimeout(() => {
      btn.disabled = false;
      btn.textContent = '🔍 Run Phase 2 Scan';
    }, 10000);
  }

  // ===== HISTORY TAB =====
  async function loadHistory() {
    const content = document.getElementById('historyContent');
    content.innerHTML = '<div class="loader">Loading history…</div>';
    
    const symbol = document.getElementById('histSymbol').value;
    const eventType = document.getElementById('histEventType').value;
    
    const params = new URLSearchParams({limit: 500});
    if (symbol) params.append('symbol', symbol.toUpperCase());
    if (eventType) params.append('event_type', eventType);
    
    const res = await fetch(`${API}/signals/history?${params}`).catch(() => null);
    if (!res || !res.ok) {
      content.innerHTML = '<div class="empty">Failed to load history</div>';
      return;
    }
    
    const {events} = await res.json();
    if (!events || events.length === 0) {
      content.innerHTML = '<div class="empty">No history events found with current filters.</div>';
      return;
    }
    
    // Count event types
    const eventCounts = {};
    events.forEach(e => {
      eventCounts[e.event_type] = (eventCounts[e.event_type] || 0) + 1;
    });
    const countBadges = Object.entries(eventCounts).map(([type, count]) => 
      `<span class="badge data">${type}: ${count}</span>`
    ).join(' ');
    
    const rows = events.map((evt, idx) => {
      const payload = evt.payload || {};
      
      // Build smart payload summary based on event type
      let payloadSummary = '';
      if (evt.event_type === 'signal_upserted') {
        const strats = payload.all_strategy_details || {};
        const stratTypes = Object.keys(strats);
        const bestType = payload.best_strategy_type || '—';
        const bestRank = payload.best_rank_score ? payload.best_rank_score.toFixed(4) : '—';
        const bestBed = payload.best_bed ? payload.best_bed.toFixed(1) : '—';
        const dte = payload.dte || '—';
        
        payloadSummary = `
          <div style="font-size:.75rem;">
            <strong>Best:</strong> ${bestType} (rank=${bestRank}, BED=${bestBed})<br>
            <strong>DTE:</strong> ${dte} | <strong>Strategies:</strong> ${stratTypes.length} types<br>
            <strong>Passed BED:</strong> ${(payload.strategies_passed_bed || []).join(', ')}
          </div>`;
      } else if (evt.event_type === 'phase3_open_fail' || evt.event_type === 'phase3_open_ok') {
        payloadSummary = `<div style="font-size:.75rem;">${JSON.stringify(payload).slice(0, 100)}...</div>`;
      } else {
        const payloadForPreview = {...payload};
        if (payload.chain_snapshot) {
          payloadForPreview.chain_snapshot = '[...]';
        }
        payloadSummary = `<div style="font-size:.75rem;color:var(--muted);">${JSON.stringify(payloadForPreview).slice(0, 100)}...</div>`;
      }
      
      const hasExpiration = evt.expiration && evt.expiration !== 'N/A';
      const viewChainLink = hasExpiration 
        ? `<a href="#" onclick="event.stopPropagation(); viewChainFromHistory('${evt.symbol}', '${evt.expiration}'); return false;" 
             style="color:var(--accent);font-size:.75rem;text-decoration:none;">🔍 View Chain</a>`
        : '';
      
      // Store event data for expanded view
      window.historyEvents = window.historyEvents || [];
      window.historyEvents[idx] = evt;
      
      const hasChainSnapshot = payload.chain_snapshot && (Array.isArray(payload.chain_snapshot) || typeof payload.chain_snapshot === 'object');
      
      return `
        <tr class="clickable" onclick="toggleHistoryPayload(${idx})">
          <td style="font-size:.75rem;color:var(--muted);">${evt.ts.slice(0, 19)}</td>
          <td><strong>${evt.event_type}</strong></td>
          <td>${evt.symbol}${evt.expiration ? ' / ' + evt.expiration : ''}</td>
          <td style="font-size:.75rem;">${evt.signal_id || '—'}</td>
          <td>${payloadSummary}</td>
          <td>${viewChainLink}</td>
        </tr>
        <tr id="payload-${idx}" style="display:none;">
          <td colspan="6" style="padding:0;">
            ${hasChainSnapshot ? renderChainSnapshotExpanded(idx, payload) : `<pre style="margin:12px;">${JSON.stringify(payload, null, 2)}</pre>`}
          </td>
        </tr>`;
    }).join('');
    
    content.innerHTML = `
      <div style="margin-bottom: 12px; display: flex; gap: 8px; align-items: center;">
        <span style="font-size: .85rem; color: var(--muted);">Showing ${events.length} events:</span>
        ${countBadges}
      </div>
      <table>
        <thead>
          <tr>
            <th>Timestamp</th>
            <th>Event Type</th>
            <th>Symbol / Exp</th>
            <th>Signal ID</th>
            <th>Payload</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  function toggleHistoryPayload(idx) {
    const row = document.getElementById(`payload-${idx}`);
    row.style.display = row.style.display === 'none' ? 'table-row' : 'none';
  }

  function renderChainSnapshotExpanded(idx, payload) {
    const snapshotData = payload.chain_snapshot || {};
    const chainTicks = snapshotData.chain || [];
    const calculations = snapshotData.calculations || {};
    
    // Build metadata excluding chain_snapshot
    const metadata = {...payload};
    delete metadata.chain_snapshot;
    
    // Group chain ticks by strike
    const strikeMap = {};
    chainTicks.forEach(tick => {
      if (!strikeMap[tick.strike]) {
        strikeMap[tick.strike] = {call: null, put: null};
      }
      if (tick.right === 'C') strikeMap[tick.strike].call = tick;
      else if (tick.right === 'P') strikeMap[tick.strike].put = tick;
    });
    
    const strikes = Object.keys(strikeMap).map(Number).sort((a, b) => a - b);
    
    const chainRows = strikes.map(strike => {
      const call = strikeMap[strike].call;
      const put = strikeMap[strike].put;
      return `
        <tr>
          <td class="bid">${fmtFixed(call?.bid, 2)}</td>
          <td class="ask">${fmtFixed(call?.ask, 2)}</td>
          <td class="mid">${fmtFixed(call?.mid, 2)}</td>
          <td class="vol">${call?.volume ?? '—'}</td>
          <td class="oi">${call?.open_interest ?? '—'}</td>
          <td class="strike"><strong>${strike.toFixed(2)}</strong></td>
          <td class="bid">${fmtFixed(put?.bid, 2)}</td>
          <td class="ask">${fmtFixed(put?.ask, 2)}</td>
          <td class="mid">${fmtFixed(put?.mid, 2)}</td>
          <td class="vol">${put?.volume || '—'}</td>
          <td class="oi">${put?.open_interest || '—'}</td>
        </tr>`;
    }).join('');
    
    return `
      <div style="padding:12px;background:var(--hover-bg);">
        <div style="margin-bottom:12px;">
          <strong>Event Metadata:</strong>
          <pre style="margin-top:6px;font-size:.85rem;">${JSON.stringify(metadata, null, 2)}</pre>
        </div>
        
        ${Object.keys(calculations).length > 0 ? `
        <div style="margin-top:16px;">
          <strong>Signal Calculations:</strong>
          <pre style="margin-top:6px;font-size:.85rem;">${JSON.stringify(calculations, null, 2)}</pre>
        </div>
        ` : ''}
        
        <div style="margin-top:16px;">
          <strong>Chain Snapshot (${chainTicks.length} options):</strong>
          <div style="overflow-x:auto;margin-top:8px;">
            <table style="font-size:.85rem;width:100%;">
              <thead>
                <tr>
                  <th colspan="5" style="background:var(--bg);text-align:center;">CALLS</th>
                  <th style="background:var(--primary);color:white;">STRIKE</th>
                  <th colspan="5" style="background:var(--bg);text-align:center;">PUTS</th>
                </tr>
                <tr>
                  <th>Bid</th><th>Ask</th><th>Mid</th><th>Vol</th><th>OI</th>
                  <th></th>
                  <th>Bid</th><th>Ask</th><th>Mid</th><th>Vol</th><th>OI</th>
                </tr>
              </thead>
              <tbody>${chainRows}</tbody>
            </table>
          </div>
        </div>
      </div>`;
  }

  function viewChainFromHistory(symbol, expiration) {
    // Switch to Chains tab
    showTab('chains');
    
    // Set the filters
    document.getElementById('symbolFilter').value = symbol;
    document.getElementById('expirationFilter').value = expiration;
    
    // Trigger the load
    loadChain();
    
    showToast(`Loading chain for ${symbol} ${expiration}...`);
  }
</script>
</body>
